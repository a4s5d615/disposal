name: 每日更新處置清單

on:
  schedule:
    # 台灣時間 09:10（UTC+8） = UTC 01:10，週一到週五
    - cron: '10 1 * * 1-5'
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python disposal_ma20.py

      - name: Rename to index.html
        run: cp disposal_ma20.html index.html

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html disposal_ma20.html
          git diff --cached --quiet || git commit -m "chore: 每日更新 $(date +'%Y-%m-%d')"
          git push
